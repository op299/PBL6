dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Đã cập nhật lên bản ổn định hơn cho SDK 3.10+

flutter:
  uses-material-design: true

  assets:
    - assets/images/