name: pbl
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1 # Thêm dòng này
  shared_preferences: ^2.2.3

  # Networking
  dio: ^5.4.1

